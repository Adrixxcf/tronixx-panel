<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tronixx Streaming — Panel de Ventas</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

  <!-- Estilos -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ═══════════════════════════════════════
       BARRA SUPERIOR
       ═══════════════════════════════════════ -->
  <div class="topbar">
    <div class="logo"><span>Tronixx</span> Streaming</div>
    <div class="topbar-right">
      <span class="topbar-date" id="topbar-date"></span>
    </div>
  </div>

  <!-- ═══════════════════════════════════════
       CONTENIDO PRINCIPAL
       ═══════════════════════════════════════ -->
  <div class="container">

    <!-- HERO BANNER -->
    <div class="hero-strip">
      <div class="hero-text">
        <h2>Panel de Control — Ventas</h2>
        <p>Gestiona todos tus perfiles y clientes desde aquí</p>
      </div>
      <button class="btn-new" onclick="openModal()">+ Nueva Venta</button>
    </div>

    <!-- MÉTRICAS (se llena con JS) -->
    <div class="metrics" id="metrics"></div>

    <!-- CONTROLES / FILTROS -->
    <div class="controls">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input id="search" type="text" placeholder="Buscar número, nombre, perfil..." oninput="renderTable()">
      </div>

      <!-- Plataformas — las opciones se agregan dinámicamente desde app.js -->
      <select class="filter-select" id="filter-platform" onchange="renderTable()">
        <option value="">Todas las plataformas</option>
      </select>

      <select class="filter-select" id="filter-status" onchange="renderTable()">
        <option value="">Todos los estados</option>
        <option>Activo</option>
        <option>Vencido</option>
        <option>Pendiente</option>
      </select>

      <select class="filter-select" id="filter-month" onchange="renderTable()">
        <option value="">Todos los meses</option>
      </select>

      <button class="btn-export" onclick="exportCSV()">⬇ Exportar CSV</button>
    </div>

    <!-- TABLA -->
    <div class="table-container">
      <div class="table-header">
        <span class="table-title">Registro de Ventas</span>
        <span class="table-count" id="table-count">0 registros</span>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th onclick="sortBy('numero')">N° Contacto ↕</th>
              <th onclick="sortBy('nombre')">Nombre ↕</th>
              <th onclick="sortBy('plataforma')">Plataforma ↕</th>
              <th onclick="sortBy('perfil')">Perfil</th>
              <th onclick="sortBy('fecha')">Fecha ↕</th>
              <th onclick="sortBy('precio')">Precio ↕</th>
              <th onclick="sortBy('estado')">Estado ↕</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>

      <div class="pagination">
        <span class="page-info" id="page-info"></span>
        <div class="page-btns">
          <button class="page-btn" id="prev-btn" onclick="changePage(-1)">← Anterior</button>
          <button class="page-btn" id="next-btn" onclick="changePage(1)">Siguiente →</button>
        </div>
      </div>
    </div>

  </div><!-- /container -->


  <!-- ═══════════════════════════════════════
       MODAL — NUEVA / EDITAR VENTA
       ═══════════════════════════════════════ -->
  <div class="modal-bg" id="modal" onclick="handleModalClick(event)">
    <div class="modal">

      <div class="modal-head">
        <h2 id="modal-title">Nueva Venta</h2>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>

      <div class="form-grid">

        <div class="form-group">
          <label>N° de contacto *</label>
          <input id="f-numero" type="text" placeholder="+51 999 888 777">
        </div>

        <div class="form-group">
          <label>Nombre del cliente</label>
          <input id="f-nombre" type="text" placeholder="Juan Pérez">
        </div>

        <!-- Plataformas — opciones se agregan dinámicamente desde app.js -->
        <div class="form-group">
          <label>Plataforma *</label>
          <select id="f-plataforma"></select>
        </div>

        <div class="form-group">
          <label>Perfil asignado *</label>
          <input id="f-perfil" type="text" placeholder="Perfil 2">
        </div>

        <div class="form-group">
          <label>Fecha de venta *</label>
          <input id="f-fecha" type="date">
        </div>

        <div class="form-group">
          <label>Precio (S/.)</label>
          <input id="f-precio" type="number" placeholder="0.00" step="0.50" min="0">
        </div>

        <div class="form-group">
          <label>Estado</label>
          <select id="f-estado">
            <option>Activo</option>
            <option>Pendiente</option>
            <option>Vencido</option>
          </select>
        </div>

        <div class="form-group">
          <label>Notas</label>
          <input id="f-notas" type="text" placeholder="Observaciones...">
        </div>

      </div><!-- /form-grid -->

      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
        <button class="btn-save"   onclick="saveRecord()">Guardar</button>
      </div>

    </div><!-- /modal -->
  </div><!-- /modal-bg -->


  <!-- JavaScript -->
  <script src="app.js"></script>

</body>
</html>
